<section
  class="bg-[#fbf5f7] border border-mystic-rose/20 rounded-2xl p-6 sm:p-8"
  aria-labelledby="newsletter-cta-heading"
  data-test="newsletter-cta"
  [attr.data-test-source]="source()"
>
  <div class="max-w-xl mx-auto text-center">
    <p class="text-mystic-gold text-xl mb-3 tracking-widest select-none" aria-hidden="true">
      ✦
    </p>
    <h2
      id="newsletter-cta-heading"
      class="serif-display text-2xl text-mystic-cocoa mb-3"
    >
      {{ heading() }}
    </h2>
    <p class="text-mystic-cocoa text-sm font-light leading-relaxed mb-6">
      {{ description() }}
    </p>

    @if (!sent()) {
      <form
        class="flex w-full flex-col gap-3 mb-4 sm:flex-row sm:gap-3"
        (submit)="onSubmit($event)"
        data-test="newsletter-cta-form"
      >
        <label class="sr-only" for="newsletter-cta-email"
          >Twój adres e-mail</label
        >
        <input
          id="newsletter-cta-email"
          name="email"
          type="email"
          required
          autocomplete="email"
          placeholder="Twój adres e-mail"
          [value]="email()"
          (input)="onEmailInput($any($event.target).value)"
          [disabled]="loading()"
          data-test="newsletter-cta-input"
          class="w-full min-w-0 rounded-full border border-mystic-rose/30 bg-white/70 px-5 py-3 text-center text-sm shadow-sm transition-colors placeholder:text-mystic-cocoa/40 focus:border-mystic-rose focus:outline-none focus:shadow-md disabled:opacity-60 sm:flex-1 sm:text-left"
        />
        <button
          type="submit"
          class="btn-primary w-full justify-center !py-3 !text-sm sm:w-auto sm:shrink-0"
          [disabled]="submitDisabled()"
          data-test="newsletter-cta-submit"
        >
          @if (loading()) {
            Wysyłamy...
          } @else {
            Zapisz mnie ✦
          }
        </button>
      </form>

      <label
        class="flex w-full items-start gap-3 mb-4 text-left text-xs text-mystic-cocoa"
        data-test="newsletter-cta-consent-label"
      >
        <input
          type="checkbox"
          required
          [checked]="consent()"
          (change)="consent.set($any($event.target).checked)"
          [disabled]="loading()"
          class="mt-0.5 h-4 w-4 shrink-0 rounded border-mystic-rose/40 text-mystic-rose accent-mystic-rose focus:ring-mystic-rose/40"
          data-test="newsletter-cta-consent"
        />
        <span class="font-light leading-relaxed">
          Wyrażam zgodę na otrzymywanie newslettera Star Sign drogą e-mailową i
          akceptuję
          <a
            routerLink="/polityka-prywatnosci"
            class="font-medium text-mystic-rose underline underline-offset-2 hover:text-mystic-cocoa"
          >
            politykę prywatności </a
          >.
        </span>
      </label>

      <app-turnstile-widget
        action="newsletter-cta"
        (tokenChange)="handleTurnstileToken($event)"
        class="mb-4 block"
      />

      <p class="text-xs text-mystic-cocoa/80 font-light leading-relaxed">
        Wyślemy link potwierdzający zapis. W każdej wiadomości znajdziesz link
        wypisu.
      </p>

      @if (errorMessage()) {
        <p
          class="text-sm text-red-600 mt-4"
          role="alert"
          data-test="newsletter-cta-error"
        >
          {{ errorMessage() }}
        </p>
      }
    } @else {
      <div
        class="p-6 bg-white/60 border border-mystic-rose/20 rounded-2xl"
        role="status"
        data-test="newsletter-cta-success"
      >
        <p class="text-mystic-rose text-3xl mb-3" aria-hidden="true">✦</p>
        <h3 class="serif-display text-xl text-mystic-cocoa mb-2">
          Dziękujemy za dołączenie!
        </h3>
        <p class="text-mystic-cocoa text-sm font-light">
          Sprawdź skrzynkę i kliknij link potwierdzający zapis.
        </p>
      </div>
    }
  </div>
</section>
